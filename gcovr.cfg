# Keep coverage deterministic when src/fts.c is built twice:
# - libfts.so.*.p/src_fts.c.o (shared library)
# - libfts_test.a.p/src_fts.c.o (test-only static library used by FTS tests)
#
# The shared object can remain stale when only tests are rebuilt, which causes
# gcovr to see the same function name on different line numbers and fail merge.
# We exclude the shared-lib object dir from coverage collection because FTS test
# coverage should come from libfts_test.a.p (the object actually linked by tests).
exclude-directories = .*/libfts\.so\..*\.p$
